# fly.toml app configuration file for Folio on Fly.io
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'foliov001'
primary_region = 'bom'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[env]
  # Lazy-start engines so the machine doesn't OOM before the first request.
  # LibreOffice peaks at ~1.3 GB under load; Chromium adds another ~300 MB.
  LIBREOFFICE_LAZY_START = "false"
  CHROMIUM_LAZY_START = "false"
  # Required in containers — no dbus/display available.
  FOLIO_NO_SANDBOX = "true"

[[vm]]
  memory = '2gb'
  cpus = 2
  memory_mb = 2048
