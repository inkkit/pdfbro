# fly.toml — pdfbro on Fly.io
# https://fly.io/docs/reference/configuration/

app = 'pdfbro'
primary_region = 'bom'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[env]
  PDFBRO_NO_SANDBOX = "true"
  CHROMIUM_LAZY_START = "true"
  LIBREOFFICE_LAZY_START = "true"
  RUST_LOG = "info,chromiumoxide::handler=error"

[[vm]]
  memory = '2gb'
  cpus = 2
  memory_mb = 2048
