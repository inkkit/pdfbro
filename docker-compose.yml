version: '3.8'

services:
  folio:
    build:
      context: .
      dockerfile: Dockerfile
      target: folio
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      - RUST_LOG=${LOG_LEVEL:-info}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  folio-chromium:
    build:
      context: .
      dockerfile: Dockerfile
      target: folio-chromium
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      - RUST_LOG=${LOG_LEVEL:-info}
    profiles: [chromium]

  folio-libreoffice:
    build:
      context: .
      dockerfile: Dockerfile
      target: folio-libreoffice
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      - RUST_LOG=${LOG_LEVEL:-info}
    profiles: [libreoffice]
