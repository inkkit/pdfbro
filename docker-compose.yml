services:
  pdfbro:
    build:
      context: .
      dockerfile: Dockerfile
      target: pdfbro
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      - RUST_LOG=${LOG_LEVEL:-info},chromiumoxide::handler=error
    tty: true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  pdfbro-chromium:
    build:
      context: .
      dockerfile: Dockerfile
      target: pdfbro-chromium
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      - RUST_LOG=${LOG_LEVEL:-info},chromiumoxide::handler=error
    tty: true
    profiles: [chromium]

  pdfbro-libreoffice:
    build:
      context: .
      dockerfile: Dockerfile
      target: pdfbro-libreoffice
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      - RUST_LOG=${LOG_LEVEL:-info}
    tty: true
    profiles: [libreoffice]
