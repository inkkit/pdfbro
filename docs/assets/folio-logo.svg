<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DE2910;stop-opacity:1" />
    </linearGradient>
    <filter id="s">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Clean background circle -->
  <circle cx="100" cy="100" r="88" fill="url(#g)" filter="url(#s)"/>
  
  <!-- Modern "F" letterform (clean, geometric) -->
  <path d="M 75 55 L 75 145 M 75 55 L 125 55 M 75 100 L 115 100" 
        stroke="white" stroke-width="18" stroke-linecap="round" fill="none"/>
  
  <!-- Subtle page accent (bottom right) -->
  <rect x="118" y="108" width="30" height="38" rx="4" fill="white" opacity="0.25"/>
  <rect x="123" y="115" width="20" height="3" rx="1" fill="white" opacity="0.6"/>
  <rect x="123" y="122" width="16" height="3" rx="1" fill="white" opacity="0.4"/>
  <rect x="123" y="129" width="20" height="3" rx="1" fill="white" opacity="0.4"/>
  
  <!-- Small "pdf" label -->
  <text x="100" y="170" font-family="Arial,sans-serif" font-size="11" font-weight="600" 
        fill="white" text-anchor="middle" letter-spacing="2">PDF</text>
</svg>
